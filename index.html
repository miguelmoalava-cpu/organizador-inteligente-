<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Organizador Pro 🐱</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="styles.css">

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Axios (IA) -->
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<!-- Confetti -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

</head>

<body>

<div class="app">

  <h1>🐱 Organizador</h1>
  <p id="summary"></p>

  <div id="progressBarContainer">
    <div id="progressBar"></div>
  </div>

  <!-- TAREAS -->
  <div id="tasksContainer"></div>

  <!-- CALENDARIO -->
  <h2>📅 Calendario</h2>
  <div id="calendarWrapper">
    <div id="calendarMini"></div>
  </div>

  <!-- SISTEMA DE NIVEL -->
  <h2>📊 Estadísticas</h2>
  <div id="levelSystem"></div>

  <!-- FINANZAS -->
  <h2>💰 Finanzas</h2>
  <div id="financeSummary"></div>
  <div id="financeContainer"></div>

  <!-- BOTONES FLOTANTES -->
  <button id="addTaskBtn" class="floating-btn">＋</button>
  <button id="addTransactionBtn" class="floating-btn finance-btn">💸</button>

</div>

<!-- MODAL NUEVA TAREA -->
<div id="modal" class="modal hidden">
  <div class="modal-content">
    <h2 id="modalTitle">Nueva tarea ✨</h2>
    <input type="text" id="taskTitle" placeholder="Ej: Estudiar mañana 6pm">
    <input type="datetime-local" id="taskDateTime">
    <select id="taskPriority">
      <option value="low">🟢 Baja</option>
      <option value="medium">🟡 Media</option>
      <option value="high">🔴 Alta</option>
    </select>
    <button id="saveTaskBtn">Guardar</button>
  </div>
</div>

<!-- MODAL FINANZAS -->
<div id="financeModal" class="modal hidden">
  <div class="modal-content">
    <h2>Nueva Transacción</h2>
    <select id="transactionType">
      <option value="ingreso">💵 Ingreso</option>
      <option value="gasto">💸 Gasto</option>
    </select>
    <input type="number" id="transactionAmount" placeholder="Monto">
    <input type="text" id="transactionDescription" placeholder="Descripción">
    <button id="saveTransactionBtn">Guardar</button>
  </div>
</div>

<!-- BARRA INFERIOR -->
<div class="bottom-nav">
  <button onclick="window.scrollTo({top:0,behavior:'smooth'})">🏠</button>
  <button onclick="document.getElementById('calendarWrapper').scrollIntoView({behavior:'smooth'})">📅</button>
  <button onclick="document.getElementById('levelSystem').scrollIntoView({behavior:'smooth'})">📊</button>
</div>

<script src="app.js" defer></script>

</body>
</html>
